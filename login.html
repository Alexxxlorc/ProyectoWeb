<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin - Le Parfum Quotidien</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: var(--vainilla);">
 
    <div class="text-center" style="width: 100%; max-width: 380px; padding: 2rem;">
 
        <a href="./index.html" class="text-decoration-none">
            <span style="font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; letter-spacing: 0.3em; color: var(--madera-oscura); text-transform: uppercase; font-weight: 600;">
                Le Parfum Quotidien
            </span>
        </a>
 
        <p style="font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--texto-suave); margin-top: 0.3rem; margin-bottom: 2.5rem;">
            Panel de Administración
        </p>
 
        <div style="width: 40px; height: 1px; background-color: var(--rojo-intenso); margin: 0 auto 2.5rem;"></div>
 
        <div class="text-start mb-3">
            <label style="font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--texto-suave); display: block; margin-bottom: 0.5rem;">
                Usuario
            </label>
            <input type="text" id="inputUsuario" class="form-control" placeholder="admin"
                style="border-radius: 0; border: 1px solid var(--linea); background-color: #fff; font-size: 0.9rem; padding: 0.7rem 1rem;">
        </div>
 
        <div class="text-start mb-2">
            <label style="font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--texto-suave); display: block; margin-bottom: 0.5rem;">
                Contraseña
            </label>
            <input type="password" id="inputPassword" class="form-control" placeholder="••••••••"
                style="border-radius: 0; border: 1px solid var(--linea); background-color: #fff; font-size: 0.9rem; padding: 0.7rem 1rem;">
        </div>
 
        <p id="errorLogin" class="text-danger small d-none" style="font-size: 0.78rem; letter-spacing: 0.05em; margin-bottom: 1rem;">
            Usuario o contraseña incorrectos
        </p>
 
        <button id="btnEntrar" class="btn btn-dark w-100 mt-3">
            Ingresar
        </button>
 
        <a href="./index.html" style="display: block; margin-top: 1.5rem; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--texto-suave); text-decoration: none;">
            ← Volver a la tienda
        </a>
 
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const btnEntrar = document.getElementById('btnEntrar');
        const inputUsuario = document.getElementById('inputUsuario');
        const inputPassword = document.getElementById('inputPassword');
        const errorLogin = document.getElementById('errorLogin');
 
        btnEntrar.addEventListener('click', function() {
            const usuario = inputUsuario.value;
            const pass = inputPassword.value;
 
            if (usuario === 'admin' && pass === 'admin123') {
                window.location.href = './admin.html';
            } else {
                errorLogin.classList.remove('d-none');
                inputPassword.value = '';
                inputPassword.focus();
            }
        });
 
        // También funciona con Enter
        inputPassword.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') btnEntrar.click();
        });
    </script>
</body>
</html>
