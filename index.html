<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Parfum Quotiden</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
   <div id="header-placeholder"></div>
    <main>
        <div id="carouselPrincipal" class="carousel slide carousel-fade mb-5" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselPrincipal" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselPrincipal" data-bs-slide-to="1"></button>
            </div>

            <div class="carousel-inner">
                <div class="carousel-item active">
                    <video autoplay muted loop class="d-block carousel-video">
                        <source src="./src/media/landing/carousel1.mp4" type="video/mp4">
                        Tu navegador no soporta el elemento de video.
                    </video>
                </div>

                <div class="carousel-item">
                    <div class="ratio-carousel">
                        <iframe
                            src="https://www.youtube.com/embed/Tdal-6WNWVo?autoplay=1&mute=1&loop=1&playlist=Tdal-6WNWVo&controls=0&showinfo=0&modestbranding=1&rel=0&playsinline=1&disablekb=1&iv_load_policy=3"
                            title="Video promocional"
                            allow="autoplay; encrypted-media; picture-in-picture"
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Nueva Experiencia</h5>
                        <p>Descubre nuestras fragancias en movimiento.</p>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselPrincipal" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselPrincipal" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <div class="container mb-5">
            <h2 class="text-center fw-bold mb-4">Explora nuestras categorías</h2>
            
            <div class="row g-4 row-cols-1 row-cols-md-3">
                <div class="col" id="dama">
                    <div class="card h-100 category-card shadow-sm border-0 text-center">
                        <div class="card-body py-5">
                            <div class="display-1 text-primary mb-3"></div>
                            <h3 class="card-title fw-bold">Dama</h3>
                            <p class="card-text text-muted">Fragancias florales, frutales y dulces.</p>
                            <a href="./src/views/dama.html" class="btn btn-primary w-100">Ver Catálogo</a>
                        </div>
                    </div>
                </div>
                
                <div class="col" id="caballero">
                    <div class="card h-100 category-card shadow-sm border-0 text-center">
                        <div class="card-body py-5">
                            <div class="display-1 text-primary mb-3"></div>
                            <h3 class="card-title fw-bold">Caballero</h3>
                            <p class="card-text text-muted">Aromas amaderados, cítricos y especiados.</p>
                            <a href="./src/views/caballero.html" class="btn btn-primary w-100">Ver Catálogo</a>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 category-card shadow-sm border-0 text-center">
                        <div class="card-body py-5">
                            <div class="display-1 text-primary mb-3"></div>
                            <h3 class="card-title fw-bold">Kits de Regalo</h3>
                            <p class="card-text text-muted">Combinaciones perfectas para sorprender.</p>
                            <a href="./src/views/kits.html" class="btn btn-primary w-100">Ver Opciones</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

   <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./src/js/includes.js"></script>
    <script src="./src/js/main.js"></script>

</body>
</html>
