<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Le Parfum Quotidien</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
 
    <div id="header-placeholder"></div>
 
    <main>
        <div class="container py-5">
 
            <h2 class="text-center fw-bold mb-5">Mi Carrito</h2>
 
            <!-- Carrito vacío -->
            <div id="carritoVacio" class="text-center py-5 d-none">
                <p class="text-muted mb-4" style="font-style: italic;">Tu carrito está vacío.</p>
                <a href="../../index.html" class="btn btn-dark">Ver productos</a>
            </div>
 
            <!-- Contenido del carrito -->
            <div id="carritoContenido" class="d-none">
                <div class="row g-4">
 
                    <!-- Lista de productos -->
                    <div class="col-lg-8">
                        <div id="listaProductos"></div>
                    </div>
 
                    <!-- Resumen del pedido -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm p-4" style="border-radius: 0 !important;">
                            <h5 class="fw-bold mb-4" style="font-family: 'Cormorant Garamond', serif; letter-spacing: 0.1em;">
                                Resumen del pedido
                            </h5>
 
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small">Subtotal</span>
                                <span id="subtotal" class="small">$ 0.00</span>
                            </div>
 
                            <div class="d-flex justify-content-between mb-3">
                                <span class="text-muted small">Envío</span>
                                <span class="small">Gratis</span>
                            </div>
 
                            <div style="height: 1px; background-color: var(--linea); margin-bottom: 1rem;"></div>
 
                            <div class="d-flex justify-content-between mb-4">
                                <span class="fw-bold">Total</span>
                                <span id="total" class="fw-bold">$ 0.00</span>
                            </div>
 
                            <button class="btn btn-dark w-100">Proceder al pago</button>
                            <a href="../../index.html" class="btn btn-outline-secondary w-100 mt-2" style="border-radius: 0 !important;">
                                Seguir comprando
                            </a>
                        </div>
                    </div>
 
                </div>
            </div>
 
        </div>
    </main>
 
    <div id="footer-placeholder"></div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/includes.js"></script>
    <script src="../js/carrito.js"></script>
</body>
</html>
